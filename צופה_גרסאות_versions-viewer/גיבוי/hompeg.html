<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת אתרוגים - התחלה</title>
    <style>
        /* CSS Variables for theming */
        :root {
          --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          --bg-secondary: white;
          --text-primary: #1e293b;
          --text-secondary: #475569;
          --card-bg: #fff;
          --border-color: #e5e7eb;
          --shadow-color: rgba(0,0,0,0.1);
          --btn-secondary-bg: #ecf0f1;
          --btn-secondary-border: #bdc3c7;
          --warn-bg: #fff3cd;
          --warn-border: #ffeeba;
          --warn-color: #856404;
          --ok-bg: #d1fae5;
          --ok-border: #10b981;
          --ok-color: #065f46;
          --tip-bg: #ecfeff;
          --tip-border: #06b6d4;
          --tip-color: #0c4a6e;
          --preview-bg: #f8fafc;
          --preview-border: #cbd5e1;
          --topbar-bg: rgba(255,255,255,0.9);
          --topbar-link-bg: #ecf0f1;
          --topbar-link-border: #bdc3c7;
        }

        [data-theme="dark"] {
          --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
          --bg-secondary: #0f0f23;
          --text-primary: #e0e0e0;
          --text-secondary: #b0b0b0;
          --card-bg: #1a1a2e;
          --border-color: #2a2a3a;
          --shadow-color: rgba(0,0,0,0.3);
          --btn-secondary-bg: #2a2a3a;
          --btn-secondary-border: #4a4a5a;
          --warn-bg: #2a2a3a;
          --warn-border: #4a4a5a;
          --warn-color: #ffd700;
          --ok-bg: #1a2e1a;
          --ok-border: #4a5a4a;
          --ok-color: #90ee90;
          --tip-bg: #1a2e2e;
          --tip-border: #4a5a5a;
          --tip-color: #87ceeb;
          --preview-bg: #1a1a2e;
          --preview-border: #2a2a3a;
          --topbar-bg: rgba(15,15,35,0.9);
          --topbar-link-bg: #2a2a3a;
          --topbar-link-border: #4a4a5a;
        }

        /* Performance optimizations */
        * {
            box-sizing: border-box;
        }

        /* Optimize images */
        img {
            max-width: 100%;
            height: auto;
            will-change: transform;
        }

        /* Smooth scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Optimize animations */
        .card, .btn, .preview {
            will-change: transform;
            backface-visibility: hidden;
        }

        /* Lazy loading for images */
        .lazy-image {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lazy-image.loaded {
            opacity: 1;
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Performance optimized transitions */
        .card, .btn, .preview {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Optimize hover effects */
        .card:hover, .btn:hover, .preview:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        /* Rest of existing CSS */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .topbar {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
            background: var(--topbar-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            border-radius: 14px;
            flex-wrap: wrap;
            box-shadow: 0 6px 18px var(--shadow-color);
            transition: all 0.3s ease;
        }

        .topbar a {
            color: var(--text-primary);
            background: var(--topbar-link-bg);
            border: 1px solid var(--topbar-link-border);
            border-radius: 18px;
            padding: 6px 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .topbar a:hover, .topbar a:focus-visible {
            background: var(--topbar-link-border);
            transform: translateY(-1px);
            outline: none;
        }

        .dark-mode-btn {
            background: var(--topbar-link-bg);
            border: 1px solid var(--topbar-link-border);
            border-radius: 18px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            color: var(--text-primary);
        }

        .dark-mode-btn:hover {
            background: var(--topbar-link-border);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        .dark-mode-btn[data-theme="dark"] {
            background: #4a4a5a;
            color: #ffffff;
        }

        /* Advanced UI/UX improvements */
        /* Glassmorphism design effects */
        .container {
            max-width: 800px;
            margin: 80px auto 20px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border-radius: 20px;
            pointer-events: none;
        }

        /* Enhanced typography hierarchy */
        h1 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 30px;
            font-size: clamp(2rem, 4vw, 3rem);
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInDown 1s ease-out;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            animation: slideInUp 1s ease-out 0.2s both;
            font-weight: 500;
            line-height: 1.4;
            opacity: 0.9;
        }

        /* Glassmorphism cards */
        .card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(31, 38, 135, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card h2 {
            color: var(--text-primary);
            margin-top: 0;
            margin-bottom: 15px;
            font-size: clamp(1.3rem, 2.5vw, 1.6rem);
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .card p {
            color: var(--text-secondary);
            line-height: 1.6;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        /* Enhanced button design */
        .btn {
            display: inline-block;
            padding: clamp(10px, 2vw, 15px) clamp(18px, 3vw, 28px);
            margin: 10px 5px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            letter-spacing: 0.02em;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(-1px) scale(1.02);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px) scale(1.05);
        }

        /* Enhanced preview container */
        .preview {
            background: rgba(255, 255, 255, 0.08);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .preview::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .preview:hover::before {
            transform: translateX(100%);
        }

        .preview:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(31, 38, 135, 0.3);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
        }

        .preview:hover img {
            transform: scale(1.02);
        }

        /* Enhanced camera tips */
        .camera-tips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 25px 0;
        }

        .tip-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .tip-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .tip-item:hover::before {
            transform: translateX(100%);
        }

        .tip-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(31, 38, 135, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tip-icon {
            font-size: clamp(1.8rem, 3vw, 2.5rem);
            margin-bottom: 15px;
            display: block;
            transition: all 0.4s ease;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .tip-item:hover .tip-icon {
            transform: scale(1.1) rotate(5deg);
            animation: bounce 0.6s ease;
        }

        .tip-item strong {
            font-weight: 600;
            color: var(--text-accent);
            display: block;
            margin-bottom: 8px;
            font-size: clamp(1rem, 2vw, 1.1rem);
        }

        .tip-item p {
            color: var(--text-secondary);
            font-size: clamp(0.9rem, 1.8vw, 1rem);
            line-height: 1.5;
            opacity: 0.9;
            margin: 0;
        }

        /* Enhanced result container */
        .result {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .result h3 {
            color: var(--text-accent);
            margin-top: 0;
            font-size: clamp(1.2rem, 2.5vw, 1.4rem);
            font-weight: 700;
            margin-bottom: 20px;
        }

        .result h4 {
            color: var(--text-accent);
            font-size: clamp(1rem, 2vw, 1.1rem);
            font-weight: 600;
            margin: 20px 0 15px 0;
        }

        .result p {
            margin: 10px 0;
            line-height: 1.6;
        }

        .result ul {
            margin: 15px 0;
            padding-left: 20px;
        }

        .result li {
            margin: 8px 0;
            line-height: 1.5;
        }

        /* Advanced loading animations */
        .loading-pulse {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }

        .loading-dots {
            display: inline-block;
            position: relative;
            width: 40px;
            height: 20px;
        }

        .loading-dots::before,
        .loading-dots::after,
        .loading-dots span {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: dots 1.5s infinite;
        }

        .loading-dots::before {
            left: 0;
            animation-delay: 0s;
        }

        .loading-dots::after {
            left: 16px;
            animation-delay: 0.2s;
        }

        .loading-dots span {
            left: 32px;
            animation-delay: 0.4s;
        }

        @keyframes dots {
            0%, 80%, 100% { transform: scale(0); opacity: 0; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Advanced header animations */
        h1 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 30px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInDown 1s ease-out;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1.2rem;
            animation: slideInUp 1s ease-out 0.2s both;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Staggered card animations */
        .card:nth-child(1) { animation: fadeInUp 0.6s ease-out 0.4s both; }
        .card:nth-child(2) { animation: fadeInUp 0.6s ease-out 0.6s both; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Camera tips animations */
        .camera-tips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .tip-item {
            background: var(--tip-bg);
            border: 1px solid var(--tip-border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tip-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(102, 126, 234, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .tip-item:hover::before {
            transform: translateX(100%);
        }

        .tip-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--shadow-color);
        }

        .tip-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            transition: all 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .tip-item:hover .tip-icon {
            transform: scale(1.1) rotate(5deg);
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: scale(1.1) translateY(0); }
            40% { transform: scale(1.1) translateY(-5px); }
            60% { transform: scale(1.1) translateY(-2px); }
        }

        /* Micro-interactions for interactive elements */
        .card, .btn, .preview, .tip-item {
            cursor: pointer;
        }

        /* Accessibility improvements */
        .btn:focus,
        .card:focus,
        .preview:focus,
        .tip-item:focus {
            outline: 3px solid #667eea;
            outline-offset: 2px;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        /* Advanced responsive animations */
        @media (max-width: 768px) {
            .tip-icon {
                animation: none;
            }
            
            .tip-item:hover {
                transform: translateY(-2px);
            }
            
            .card:hover {
                transform: translateY(-2px);
            }
            
            .btn:hover {
                transform: translateY(-1px) scale(1.02);
            }
        }

        /* Performance optimized animations */
        @media (prefers-reduced-motion: reduce) {
            .tip-icon,
            .card::before,
            .btn::before,
            .preview::before,
            .tip-item::before {
                animation: none;
            }
            
            .card:hover,
            .btn:hover,
            .preview:hover,
            .tip-item:hover {
                transform: none;
            }
        }

        /* Additional styling for other elements */
        .warn {
            background: var(--warn-bg);
            border: 1px solid var(--warn-border);
            color: var(--warn-color);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .ok {
            background: var(--ok-bg);
            border: 1px solid var(--ok-border);
            color: var(--ok-color);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .result {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .tip {
            background: var(--tip-bg);
            border: 1px solid var(--tip-border);
            color: var(--tip-color);
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-style: italic;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                margin: 70px 10px 10px 10px;
                padding: 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .camera-tips {
                grid-template-columns: 1fr;
            }

            .btn {
                display: block;
                width: 100%;
                margin: 10px 0;
            }

            .tip-icon {
                animation: none;
            }
            
            .tip-item:hover {
                transform: translateY(-2px);
            }
            
            .card:hover {
                transform: translateY(-2px);
            }
            
            .btn:hover {
                transform: translateY(-1px) scale(1.02);
            }
        }

        /* Grid overlay for camera */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .grid-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
        }

        .grid-line.vertical {
            width: 1px;
            height: 100%;
        }

        .grid-line.horizontal {
            height: 1px;
            width: 100%;
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            .card,
            .preview,
            .tip-item {
                border: 2px solid var(--text-primary);
                background: rgba(255, 255, 255, 0.95);
            }
            
            .btn {
                border: 2px solid var(--text-primary);
            }
        }

        /* Advanced new features */
        /* Drag & Drop zone styling */
        .drag-drop-zone {
            border: 3px dashed rgba(102, 126, 234, 0.6);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            background: rgba(102, 126, 234, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);

    <div class="topbar">
        <a href="../versions-overview.html">📚 קבצים</a>
        <a href="../../index.html">🏠 דף הבית</a>
        <button class="dark-mode-btn" onclick="toggleDarkMode()">🌙</button>
    </div>

    <div class="container">
        <h1>בדיקת אתרוגים - התחלה</h1>
        <p class="subtitle">בחרו איך תרצו לבדוק את האתרוג שלכם</p>
        
        <div class="feature">
            <h3>📁 העלאת תמונה</h3>
            <p>העלו תמונה של האתרוג לבדיקה</p>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
            <button class="btn" onclick="document.getElementById('fileInput').click()">בחר תמונה</button>
        </div>

        <div class="feature">
            <h3>📷 מצלמה</h3>
            <p>צלמו את האתרוג ישירות מהמצלמה</p>
            <button class="btn" onclick="openCamera()">פתח מצלמה</button>
        </div>

        <div id="cameraContainer" style="display: none;">
            <video id="video" autoplay></video>
            <button class="btn" onclick="captureImage()">צלם תמונה</button>
            <button class="btn secondary" onclick="closeCamera()">סגור מצלמה</button>
        </div>

        <div id="previewContainer" style="display: none;">
            <h3>תמונה שצולמה:</h3>
            <img id="preview" alt="תמונה שצולמה">
            <button class="btn" onclick="analyzeImage()">נתח תמונה</button>
        </div>

        <div id="resultContainer" style="display: none;">
            <h3>תוצאות הניתוח:</h3>
            <div id="result"></div>
        </div>
    </div>

    <script>
        // Dark mode toggle
        function toggleDarkMode() {
            const body = document.body;
            const btn = document.querySelector('.dark-mode-btn');
            const currentTheme = body.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                body.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Load saved theme
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
                document.querySelector('.dark-mode-btn').textContent = '☀️';
            }
        });

        // Camera functions
        let stream = null;

        function openCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(mediaStream) {
                    stream = mediaStream;
                    const video = document.getElementById('video');
                    video.srcObject = mediaStream;
                    document.getElementById('cameraContainer').style.display = 'block';
                })
                .catch(function(err) {
                    alert('לא ניתן לגשת למצלמה: ' + err.message);
                });
        }

        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            document.getElementById('cameraContainer').style.display = 'none';
        }

        function captureImage() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg');
            document.getElementById('preview').src = imageData;
            document.getElementById('previewContainer').style.display = 'block';
            
            closeCamera();
        }

        // File input handling
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('previewContainer').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Image analysis
        function analyzeImage() {
            const resultContainer = document.getElementById('resultContainer');
            const resultDiv = document.getElementById('result');
            
            resultContainer.style.display = 'block';
            resultDiv.innerHTML = '<p>מנתח תמונה...</p>';
            
            // Simulate analysis
            setTimeout(() => {
                const analysis = performAnalysis();
                resultDiv.innerHTML = analysis;
            }, 1000);
        }

        function performAnalysis() {
            const analyses = [
                'האתרוג נראה כשר ומהדרין',
                'האתרוג כשר לשימוש',
                'יש פגם קל באתרוג',
                'האתרוג פסול לשימוש'
            ];
            
            const randomAnalysis = analyses[Math.floor(Math.random() * analyses.length)];
            return `<p><strong>תוצאה:</strong> ${randomAnalysis}</p>`;
        }
    </script>
